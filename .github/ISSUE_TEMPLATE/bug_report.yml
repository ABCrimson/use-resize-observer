name: Bug Report
description: Report a bug in @crimson_dev/use-resize-observer
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: dropdown
    id: hook
    attributes:
      label: Hook/Entry Used
      options:
        - useResizeObserver (main)
        - useResizeObserverWorker (worker)
        - useResizeObserverEntries (multi)
        - createResizeObserver (factory)
        - createResizeObservable (core)
        - Shim
        - Server
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      multiple: true
      options:
        - Chrome/Chromium
        - Firefox
        - Safari/WebKit
        - Edge
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    id: react-version
    attributes:
      label: React Version
      placeholder: "19.3.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, bundler, etc.
      render: shell
