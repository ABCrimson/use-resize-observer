<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" fill="none">
  <style>
    @media (prefers-reduced-motion: reduce) {
      .flow-pulse { animation: none !important; }
    }
    .layer { fill: oklch(17% 0.02 11); stroke: oklch(42% 0.15 11); stroke-width: 1.5; rx: 6; }
    .layer-hot { fill: oklch(20% 0.04 11); stroke: oklch(52% 0.26 11); stroke-width: 2; rx: 6; }
    .txt { fill: oklch(94% 0.01 11); font-family: 'Geist', system-ui; font-size: 13px; text-anchor: middle; }
    .txt-dim { fill: oklch(55% 0.02 11); font-family: 'Geist Mono', monospace; font-size: 11px; text-anchor: middle; }
    .connector { stroke: oklch(52% 0.26 11); stroke-width: 2; stroke-dasharray: 4 3; }
    .flow-pulse { animation: flow 3s ease-in-out infinite; }
    @keyframes flow {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: 14; }
    }
  </style>

  <!-- Layer 0 -->
  <rect class="layer-hot" x="200" y="20" width="300" height="55" />
  <text class="txt" x="350" y="45">Layer 0: ResizeObserver Callback</text>
  <text class="txt-dim" x="350" y="62">~8ms browser budget</text>

  <!-- Layer 1 -->
  <rect class="layer" x="200" y="100" width="300" height="55" />
  <text class="txt" x="350" y="125">Layer 1: Entry Deduplication</text>
  <text class="txt-dim" x="350" y="142">Map&lt;Element, Entry&gt; last-write-wins</text>

  <!-- Layer 2 -->
  <rect class="layer-hot" x="200" y="180" width="300" height="55" />
  <text class="txt" x="350" y="205">Layer 2: rAF Batcher</text>
  <text class="txt-dim" x="350" y="222">Coalesces all entries per frame</text>

  <!-- Layer 3 -->
  <rect class="layer" x="200" y="260" width="300" height="55" />
  <text class="txt" x="350" y="285">Layer 3: startTransition</text>
  <text class="txt-dim" x="350" y="302">Non-urgent state updates</text>

  <!-- Layer 4 -->
  <rect class="layer" x="200" y="340" width="300" height="55" />
  <text class="txt" x="350" y="365">Layer 4: React Scheduler</text>
  <text class="txt-dim" x="350" y="382">Batched re-renders</text>

  <!-- Layer 5 -->
  <rect class="layer-hot" x="200" y="420" width="300" height="55" />
  <text class="txt" x="350" y="445">Layer 5: Paint</text>
  <text class="txt-dim" x="350" y="462">Single frame output</text>

  <!-- Connectors -->
  <line class="connector flow-pulse" x1="350" y1="75" x2="350" y2="100" />
  <line class="connector flow-pulse" x1="350" y1="155" x2="350" y2="180" />
  <line class="connector flow-pulse" x1="350" y1="235" x2="350" y2="260" />
  <line class="connector flow-pulse" x1="350" y1="315" x2="350" y2="340" />
  <line class="connector flow-pulse" x1="350" y1="395" x2="350" y2="420" />
</svg>
