<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 700 500"><style>@media (prefers-reduced-motion:reduce){*{animation:none!important}}@keyframes flow{0%,to{stroke-dashoffset:0}50%{stroke-dashoffset:14}}.layer{fill:oklch(17%.02 11);stroke:oklch(42%.15 11);stroke-width:1.5;rx:6}.layer-hot{fill:oklch(20%.04 11);stroke:oklch(52%.26 11);stroke-width:2;rx:6}.txt,.txt-dim{fill:oklch(94%.01 11);font-family:&quot;Geist&quot;,system-ui;font-size:13px;text-anchor:middle}.txt-dim{fill:oklch(55%.02 11);font-family:&quot;Geist Mono&quot;,monospace;font-size:11px}</style><path d="M200 20h300v55H200z" class="layer-hot"/><text x="350" y="45" class="txt">Layer 0: ResizeObserver Callback</text><text x="350" y="62" class="txt-dim">~8ms browser budget</text><path d="M200 100h300v55H200z" class="layer"/><text x="350" y="125" class="txt">Layer 1: Entry Deduplication</text><text x="350" y="142" class="txt-dim">Map&lt;Element, Entry&gt; last-write-wins</text><path d="M200 180h300v55H200z" class="layer-hot"/><text x="350" y="205" class="txt">Layer 2: rAF Batcher</text><text x="350" y="222" class="txt-dim">Coalesces all entries per frame</text><path d="M200 260h300v55H200z" class="layer"/><text x="350" y="285" class="txt">Layer 3: startTransition</text><text x="350" y="302" class="txt-dim">Non-urgent state updates</text><path d="M200 340h300v55H200z" class="layer"/><text x="350" y="365" class="txt">Layer 4: React Scheduler</text><text x="350" y="382" class="txt-dim">Batched re-renders</text><path d="M200 420h300v55H200z" class="layer-hot"/><text x="350" y="445" class="txt">Layer 5: Paint</text><text x="350" y="462" class="txt-dim">Single frame output</text><path d="M350 75v25m0 55v25m0 55v25m0 55v25m0 55v25" style="stroke:oklch(52%.26 11);stroke-width:2;stroke-dasharray:4 3;animation:flow 3s ease-in-out infinite"/></svg>