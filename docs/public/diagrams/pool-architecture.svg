<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <style>
    @media (prefers-reduced-motion: reduce) {
      .animate { animation: none !important; }
    }
    .node { fill: oklch(17% 0.02 11); stroke: oklch(52% 0.26 11); stroke-width: 2; rx: 8; }
    .node-accent { fill: oklch(17% 0.02 11); stroke: oklch(58% 0.22 280); stroke-width: 2; rx: 8; }
    .label { fill: oklch(94% 0.01 11); font-family: 'Geist', system-ui; font-size: 14px; text-anchor: middle; }
    .label-sm { fill: oklch(72% 0.02 11); font-family: 'Geist', system-ui; font-size: 11px; text-anchor: middle; }
    .arrow { stroke: oklch(55% 0.02 11); stroke-width: 2; marker-end: url(#arrowhead); }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="oklch(55% 0.02 11)" />
    </marker>
  </defs>

  <!-- Component boxes -->
  <rect class="node" x="20" y="30" width="140" height="50" />
  <text class="label" x="90" y="60">Component A</text>

  <rect class="node" x="20" y="100" width="140" height="50" />
  <text class="label" x="90" y="130">Component B</text>

  <rect class="node" x="20" y="170" width="140" height="50" />
  <text class="label" x="90" y="200">Component C</text>

  <!-- Pool -->
  <rect class="node-accent animate pulse" x="250" y="80" width="180" height="100" />
  <text class="label" x="340" y="115">ObserverPool</text>
  <text class="label-sm" x="340" y="140">Single ResizeObserver</text>
  <text class="label-sm" x="340" y="158">WeakMap + FinalizationRegistry</text>

  <!-- Scheduler -->
  <rect class="node-accent" x="500" y="80" width="160" height="100" />
  <text class="label" x="580" y="115">RafScheduler</text>
  <text class="label-sm" x="580" y="140">rAF batching</text>
  <text class="label-sm" x="580" y="158">startTransition</text>

  <!-- React -->
  <rect class="node" x="640" y="260" width="140" height="50" />
  <text class="label" x="710" y="290">React Render</text>

  <!-- Paint -->
  <rect class="node" x="640" y="330" width="140" height="50" />
  <text class="label" x="710" y="360">1 Paint</text>

  <!-- Arrows -->
  <line class="arrow" x1="160" y1="55" x2="248" y2="110" />
  <line class="arrow" x1="160" y1="125" x2="248" y2="130" />
  <line class="arrow" x1="160" y1="195" x2="248" y2="155" />
  <line class="arrow" x1="430" y1="130" x2="498" y2="130" />
  <line class="arrow" x1="660" y1="130" x2="708" y2="258" />
  <line class="arrow" x1="710" y1="310" x2="710" y2="328" />
</svg>
