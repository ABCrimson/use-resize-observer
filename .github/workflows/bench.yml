name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run bench
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench/results/
      - uses: actions/github-script@v8
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('bench/results').filter(f => f.endsWith('.json'));
            let body = '## Benchmark Results\n\n';
            for (const file of files) {
              const data = JSON.parse(fs.readFileSync(`bench/results/${file}`, 'utf8'));
              body += `### ${file.replace('.json', '')}\n\n`;
              body += '| Benchmark | ops/sec | Mean (ms) | Margin |\n';
              body += '|-----------|---------|-----------|--------|\n';
              for (const r of data.results) {
                body += `| ${r.name} | ${r.opsPerSecond.toFixed(0)} | ${(r.meanTime * 1000).toFixed(3)} | \u00b1${r.margin.toFixed(2)}% |\n`;
              }
              body += '\n';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
